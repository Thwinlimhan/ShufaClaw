# ShufaClaw V2 — Infrastructure Services
# Run with: docker-compose up -d
# Stop with: docker-compose down

services:

  # ==============================
  # TimescaleDB (replaces SQLite)
  # ==============================
  # TimescaleDB is PostgreSQL with superpowers for time-series data.
  # It stores candles, features, signals, trades — anything with a timestamp.
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: shufaclaw-timescaledb
    ports:
      - "5433:5432"              # Connect at localhost:5433
    environment:
      POSTGRES_USER: shufaclaw
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shufaclaw_dev_2024}
      POSTGRES_DB: shufaclaw
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shufaclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # Redis (replaces in-memory cache)
  # ==============================
  # Redis is an ultra-fast key-value store.
  # It caches API responses, stores session data, and handles rate limiting.
  redis:
    image: redis:7-alpine
    container_name: shufaclaw-redis
    ports:
      - "6379:6379"              # Connect at localhost:6379
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # Kafka + Zookeeper (event bus)
  # ==============================
  # Kafka is a message queue. When one module produces data (e.g. a new candle),
  # Kafka delivers it to all modules that need it (features, regime detection, etc.)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: shufaclaw-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: shufaclaw-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"              # Connect at localhost:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # ==============================
  # Kafka UI (optional, for debugging)
  # ==============================
  # A web interface to see messages flowing through Kafka.
  # Open http://localhost:8080 in your browser to view topics and messages.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: shufaclaw-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: shufaclaw
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped

# Named volumes — Docker manages these automatically
# Data persists even if containers are stopped/removed
volumes:
  timescaledb_data:
  redis_data:
  zookeeper_data:
  kafka_data:
